services:
  - type: web
    name: resep-nusantara-api
    runtime: python
    repo: https://github.com/username/resep-nusantara-api
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0